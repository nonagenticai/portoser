# Portoser Web Interface Service Configuration
name: portoser-web
hostname: ${PORTOSER_WEB_HOSTNAME:-portoser.local}
type: docker
ports: [8989, 8988]

# Service commands
start: docker-compose up -d
stop: docker-compose down
restart: docker-compose restart
status: docker-compose ps --format json | jq -r '.[].State' | grep -q "running" && echo "running" || echo "stopped"
healthcheck: curl -f http://localhost:8989 && curl -f http://localhost:8988/api/health

# Configuration — paths are relative to the portoser repo root.
docker_compose_file: web/docker-compose.yml

# Dependencies
dependencies:
  caddy:
    type: native
    reason: Reverse proxy for HTTPS access

# Environment — paths resolved at startup relative to the repo root unless
# overridden by env vars in your shell or .env file.
environment:
  CADDY_REGISTRY_PATH: ${CADDY_REGISTRY_PATH:-./registry.yml}
  PORTOSER_CLI: ${PORTOSER_CLI:-./portoser}

# Notes
notes: |
  Web-based cluster management interface for Portoser
  - Frontend: React + Vite on port 8989
  - Backend: FastAPI on port 8988
  - Drag & drop deployment interface
  - Real-time WebSocket updates

  Access via: http://localhost:8989
  API docs: http://localhost:8988/docs

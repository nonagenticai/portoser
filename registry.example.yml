    tls_key: /fr/certs/fr-backend-key.pem
    ca_cert: /fr/certs/ca-cert.pem
  orchestrator:
    hostname: orchestrator.internal
    current_host: m1
    deployment_type: docker
    docker_compose: /orchestrator/docker-compose.yml

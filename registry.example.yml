    deployment_type: docker
    docker_compose: /n8n/docker-compose.yml
    port: 5678
    tls_cert: /caddy/certs/n8n/n8n-server-cert.pem
    tls_key: /caddy/certs/n8n/n8n-server-key.pem
    ca_cert: /caddy/certs/n8n/n8n-ca-cert.pem
    healthcheck_url: http://n8n.internal/healthz
    description: Workflow automation platform with full cluster API access
  portoser-frontend:
    hostname: portoser.internal
    current_host: m1
    deployment_type: docker
    docker_compose: /portoser/web/docker-compose.yml
    service_name: frontend
    port: 8989
  portoser-backend:
    hostname: portoser-api.internal
    current_host: m1
    deployment_type: docker
    docker_compose: /portoser/web/docker-compose.yml

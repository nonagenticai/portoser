# =============================================================================
# EXAMPLE service registry — reference layout for a 7-host home-lab cluster.
#
# This is the canonical example for the v3 / "minimal" schema described in
# the registry schema docs at https://portoser-docs.netlify.app/configuration/registry. Copy to `registry.yml` and point CADDY_REGISTRY_PATH
# at it (or set REGISTRY_FILE for cluster-compose.sh).
#
# Replace ALL of the following before using as a live registry:
#   - IP addresses        (placeholders use RFC5737 TEST-NET-1: 192.0.2.X)
#   - ssh_user / path     (placeholders use <ssh-user> / <base-path>)
#   - service hostnames   (the *.internal names below are illustrative)
#
# Other example schemas that previously shipped have been retired:
#   - registry_v3.example.yml      (duplicate of this file with stale IPs)
#   - registry_extended.example.yml (inventory-oriented variant; not consumed
#                                    by any code path - removed)
# =============================================================================
domain: internal
dns:
  host: mini1
  ingress_ip: 192.0.2.10
  config_path: /opt/homebrew/etc/dnsmasq.conf
  resolver_path: /etc/resolver/internal
hosts:
  m1:
    ip: 192.0.2.20
    arch: arm64-apple
    ssh_user: <ssh-user>
    path: <base-path>
    roles:
      - user_services
      - workflows
      - vault
  mini1:
    ip: 192.0.2.10
    arch: arm64-apple
    ssh_user: mini1
    path: <base-path>
    roles:
      - infrastructure
      - test_databases
      - mlx_backends
  mini2:
    ip: 192.0.2.11
    arch: arm64-apple
    ssh_user: mini2
    path: <base-path>
    roles:
      - production_databases
      - mlx_inference
  pi1:
    ip: 192.0.2.31
    arch: arm64-linux
    ssh_user: pi1
    path: <base-path>
    roles:
      - kag_ecosystem
  pi2:
    ip: 192.0.2.32
    arch: arm64-linux
    ssh_user: pi2
    path: <base-path>
    roles:
      - management_services
  pi3:
    ip: 192.0.2.33
    arch: arm64-linux
    ssh_user: pi3
    path: <base-path>
    roles:
      - business_services
      - ingestion
  pi4:
    ip: 192.0.2.34
    arch: arm64-linux
    ssh_user: pi4
    path: <base-path>
    roles:
      - coding_service
services:
  # Infrastructure Services (mini1)
  dnsmasq:
    hostname: dnsmasq.internal
    current_host: mini1
    deployment_type: native
    service_file: /dnsmasq/service.yml
    port: 53
  caddy:
    hostname: caddy.internal
    current_host: mini1
    deployment_type: native
    service_file: /caddy/service.yml
    port: 80

  # Test Databases (mini1)
  postgres-test:
    hostname: postgres-test.internal
    current_host: mini1
    deployment_type: native
    service_file: /postgres/service.yml
    port: 5432
  pgbouncer-test:
    hostname: pgbouncer-test.internal
    current_host: mini1
    deployment_type: native
    service_file: /pgbouncer/service.yml
    port: 6432
  neo4j-test:
    hostname: neo4j-test.internal
    current_host: mini1
    deployment_type: native
    service_file: /neo4j/service.yml
    port: 7687

  # Authentication & Storage (mini1)
  keycloak:
    hostname: keycloak.internal
    current_host: mini1
    deployment_type: docker
    docker_compose: /keycloak/docker-compose.yml
    port: 8080
    tls_cert: /keycloak/certs/keycloak-cert.pem
    tls_key: /keycloak/certs/keycloak-key.pem
    ca_cert: /keycloak/certs/ca-cert.pem
    healthcheck_url: http://keycloak.internal/
  storage:
    hostname: storage.internal
    current_host: mini1
    deployment_type: docker
    docker_compose: /storage_service/docker-compose.yml
    port: 8389
    healthcheck_url: http://storage.internal/minio/health/live

  # MLX Backends (mini1)
  mlx-backend:
    hostname: mlx-backend.internal
    current_host: mini1
    deployment_type: local
    service_file: /mlx_backend/service.yml
    port: 9101
    tls_cert: /mlx_backend/certs/mlx-backend-cert.pem
    tls_key: /mlx_backend/certs/mlx-backend-key.pem
    ca_cert: /mlx_backend/certs/ca-cert.pem
  mlx-ingestion-backend:
    hostname: mlx-ingestion-backend.internal
    current_host: mini1
    deployment_type: local
    service_file: /mlx_ingestion_backend/service.yml
    port: 9110
    tls_cert: /mlx_ingestion_backend/certs/mlx-ingestion-backend-cert.pem
    tls_key: /mlx_ingestion_backend/certs/mlx-ingestion-backend-key.pem
    ca_cert: /mlx_ingestion_backend/certs/ca-cert.pem

  # Production Databases (mini2)
  postgres-prod:
    hostname: postgres-prod.internal
    current_host: mini2
    deployment_type: native
    service_file: /postgres/service.yml
    port: 5432
  pgbouncer-prod:
    hostname: pgbouncer-prod.internal
    current_host: mini2
    deployment_type: native
    service_file: /pgbouncer/service.yml
    port: 6432
  neo4j-prod:
    hostname: neo4j-prod.internal
    current_host: mini2
    deployment_type: native
    service_file: /neo4j/service.yml
    port: 7687
    tls_cert: /neo4j/certs/bolt/public.crt
    tls_key: /neo4j/certs/bolt/private.key
    ca_cert: /neo4j/certs/bolt/trusted/ca-cert.pem

  # MLX Inference (mini2)
  mlx-inference:
    hostname: mlx-inference.internal
    current_host: mini2
    deployment_type: local
    service_file: /mlx_inference/service.yml
    port: 8999
    tls_cert: /mlx_inference/certs/mlx-inference-cert.pem
    tls_key: /mlx_inference/certs/mlx-inference-key.pem
    ca_cert: /mlx_inference/certs/ca-cert.pem

  # User Services (m1)
  vault:
    hostname: vault.internal
    current_host: m1
    deployment_type: docker
    docker_compose: /vault/docker-compose.yml
    port: 8200
    tls_cert: /caddy/certs/vault/vault-server-cert.pem
    tls_key: /caddy/certs/vault/vault-server-key.pem
    ca_cert: /caddy/certs/vault/vault-ca-cert.pem
    healthcheck_url: https://vault.internal:8200/v1/sys/health
  fr-frontend:
    hostname: fr-frontend.internal
    current_host: m1
    deployment_type: docker
    docker_compose: /fr/docker-compose.yml
    service_name: fr-frontend

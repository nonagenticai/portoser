caddy:
  host: mini1
  ingress_host: mini1
  config_path: /caddy/Caddyfile
  admin_api: http://127.0.0.1:2019
  use_admin_api: true
version: 3.0
last_updated: '2025-12-11T00:00:00Z'
schema: minimal
notes: |
  Registry tracks deployment locations based on realistic resource allocation.

  Service Allocation Strategy:
  - m1 (Mac Studio): User services, workflows, vault, orchestration (7 services)
  - mini1 (Mac Mini): Infrastructure, test DBs, MLX backends (9 services)
  - mini2 (Mac Mini): Production DBs, MLX inference (4 services)
  - pi1 (Raspberry Pi): KAG ecosystem with sequential execution (7 services)
  - pi2 (Raspberry Pi): Management services (4 services)
  - pi3 (Raspberry Pi): Business services + ingestion (6 services)
  - pi4 (Raspberry Pi): Coding service with sequential test execution (1 service)

  Key Principles:
  1. Sequential Workload Pattern: Most services execute sequentially, not concurrently
  2. ML Offloading: Heavy ML operations delegated to shared mlx-* backends
  3. Idle Optimization: Services idle 85-98% of time
  4. Hardware Right-Sizing: Raspberry Pis handle 65% of services (sequential workloads)
  5. Shared Infrastructure: Single postgres, neo4j, caddy, dnsmasq for all services

  Resource Summary:
  - Total Services: 38 services across 7 hosts
  - Total RAM: 128GB available, ~38GB typical usage (30%), ~55GB peak (43%)
  - Removed: grafana, prometheus, loki, tempo, grafana-agent, postgres-exporter

  Service Configuration:
  - docker-compose.yml for Docker services (includes dependencies, certificates, environment)
  - service.yml for local/native services (includes dependencies, configuration)
  - .env files for secrets only

  For certificate management and service configuration standards, see:
  - /ENV_VARIABLE_STANDARD.md (comprehensive service configuration)
  - Individual service docker-compose.yml files (per-service implementation)

  Migration Notes:
  - secrets: moved from mini1 to pi3
  - licenses: moved from mini1 to pi3
  - requirements: moved from mini1 to pi3
  - procedures: moved from mini1 to pi3
  - artifacts: moved from mini1 to pi3
  - ingestion: moved from mini1 to pi3
  - KAG services: moved from mini2 to pi1
  - coding: moved from mini1 to pi4
  - workers, kanban, mcp, tools: moved from mini1 to pi2

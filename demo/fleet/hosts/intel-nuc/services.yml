# intel-nuc — Intel NUC, role: monitoring + reverse proxy.
# Grafana + Prometheus + Caddy is the canonical homelab observability/ingress
# triad.
services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=24h
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
    # Read by portoser's `dependencies graph` over SSH — Grafana uses
    # Prometheus as its datasource, so this matches reality.
    depends_on:
      - prometheus

  caddy:
    image: caddy:2.8-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    # Caddy reverse-proxies grafana (see Caddyfile) — the dependency graph
    # picks this up so the UI shows the realistic ingress edge.
    depends_on:
      - grafana

volumes:
  prometheus-data:
  grafana-data:
  caddy-data:
  caddy-config:

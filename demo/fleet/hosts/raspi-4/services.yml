# raspi-4 — Raspberry Pi 4, role: home automation + DNS.
# Pi-hole and Home Assistant are the two most-recognizable apps on a homelab Pi.
services:
  pihole:
    image: pihole/pihole:2024.07.0
    container_name: pihole
    restart: unless-stopped
    ports:
      # 53 is dnsmasq inside pihole; we only expose the web UI for the demo.
      - "8053:80"
    environment:
      TZ: UTC
      WEBPASSWORD: homelab-demo
      DNSMASQ_LISTENING: local
    volumes:
      - pihole-etc:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d

  homeassistant:
    image: homeassistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    ports:
      - "8123:8123"
    volumes:
      - homeassistant-config:/config
    # depends_on is what portoser's `dependencies graph` walks (via SSH to
    # the fakehost). Reflects the realistic homelab pattern of HA pulling
    # readings from a custom sensor service.
    depends_on:
      - python-sensors
    # HA needs privileged on real hardware for Bluetooth/USB; not needed in DinD
    # but harmless to omit.

  python-sensors:
    # Loaded onto this fakehost by fleet-up.sh via `docker save | ssh ... docker load`.
    image: portoser-demo/python-sensors:latest
    container_name: python-sensors
    restart: unless-stopped
    ports:
      - "8011:8011"

volumes:
  pihole-etc:
  pihole-dnsmasq:
  homeassistant-config:

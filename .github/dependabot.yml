version: 2
updates:
  - package-ecosystem: pip
    directory: /web/backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
    groups:
      all-non-major:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /web/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
    groups:
      all-non-major:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
    groups:
      all-non-major:
        update-types:
          - minor
          - patch

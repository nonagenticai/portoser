# ==============================================================================
# Risk Assessment
# ==============================================================================

risk_assessment:
  memory_oversubscription_risk:
    level: HIGH
    host: mini2
    issue: "107% memory allocation - 17.13GB on 16GB host"
    impact: "Will cause swapping, severe performance degradation"
    mitigation_required: "MUST reduce postgres and neo4j configs before deployment"
    validation: "Monitor swap usage with: watch -n 5 'free -h && sudo swapon --show'"

  cpu_oversubscription_risk:
    level: HIGH
    hosts: ["pi1 (350%)", "pi2 (290%)", "pi4 (278%)", "pi3 (271%)"]
    issue: "Severe CPU oversubscription across all Pi hosts"
    impact: "Slow response times under load, task queueing, sequential processing"
    acceptable: "YES - per user requirements and workload characteristics"
    characteristics:
      - "ML inference is bursty (karma, hirag, pytorch services)"
      - "Test executors idle except during test runs"
      - "Celery workers queue tasks naturally"
      - "Most services are event-driven HTTP APIs, not CPU-bound"
    monitoring: "Track: CPU wait times, load average, service response latencies"

  disk_oversubscription_risk:
    level: MEDIUM
    host: pi4
    issue: "102% disk allocation - 260GB on 256GB host"
    impact: "Will fill disk, observability data loss"
    mitigation: "Retention periods trimmed to bare minimum"
    monitoring: "Set alerts at 85%, 90%, 95% disk usage"
    fallback: "Can reduce Prometheus retention to 7d if needed (saves 36GB)"

  cascading_failure_risk:
    level: MEDIUM
    scenarios:
      - "Database overload on mini2 could impact all services"
      - "CPU starvation on pi1 could slow all ML workloads"
      - "Disk full on pi4 loses observability visibility"
    mitigation:
      - "Deploy in phases, validate each host before proceeding"
      - "Keep monitoring external (not just on pi4)"
      - "Have rollback plan for each host"

  network_risk:
    level: LOW
    dependencies: "All services require workflow-system-network and DNS"
    mitigation: "Ensure network exists on all hosts, test DNS resolution"

# ==============================================================================
# Configuration Changes Required
# ==============================================================================

configuration_changes_required:
  mini2_postgres_prod:
    urgency: CRITICAL
    when: "BEFORE deployment"
    file: "/opt/homebrew/var/postgresql@18/postgresql.conf"
    changes:
      shared_buffers: "2GB (reduced from 4GB)"
      effective_cache_size: "6GB (reduced from 12GB)"
      maintenance_work_mem: "512MB (reduced from 2GB)"
      work_mem: "64MB"
    estimated_memory_savings: "7GB"
    performance_impact: "Minor - still adequate for production workload"

  mini2_neo4j_prod:
    urgency: CRITICAL
    when: "BEFORE deployment"
    file: "/Users/you/services/neo4j-prod/neo4j.conf"
    changes:
      heap_initial_size: "4G (reduced from 6G)"
      heap_max_size: "4G (reduced from 6G)"
    estimated_memory_savings: "2GB"
    performance_impact: "Moderate - may affect large graph operations"

  pi4_loki:
    urgency: CRITICAL
    when: "BEFORE deployment"
    file: "/Users/you/services/grafana/loki-config.yaml"
    changes:
      - "limits_config.max_query_lookback: 168h"
      - "compactor.retention_enabled: true"
      - "compactor.retention_period: 168h"
    target_disk: "50GB"
    impact: "Logs older than 7 days deleted"

  pi4_tempo:
    urgency: CRITICAL
    when: "BEFORE deployment"
    file: "/Users/you/services/grafana/tempo-config.yaml"
    changes:
      - "storage.trace.block.retention: 12h"
    target_disk: "60GB"
    impact: "Traces older than 12h deleted, may impact debugging"

  pi4_prometheus:
    urgency: CRITICAL
    when: "BEFORE deployment"
    file: "docker-compose.yml or prometheus startup"
    changes:
      - "Add command arg: --storage.tsdb.retention.time=10d"
    target_disk: "120GB"
    impact: "Metrics older than 10 days deleted"

# ==============================================================================
# Migration Sequence
# ==============================================================================

migration_sequence:
  prerequisites:
    - step: "Backup all databases"
      commands:
        - "pg_dump postgres-prod > /backup/postgres-prod-$(date +%Y%m%d).sql"
        - "pg_dump postgres-test > /backup/postgres-test-$(date +%Y%m%d).sql"
        - "neo4j-admin dump --database=neo4j > /backup/neo4j-prod-$(date +%Y%m%d).dump"
      estimated_time: "1-2 hours"

    - step: "Apply configuration changes"
      hosts: ["mini2", "pi4"]
      configs: ["postgres-prod", "neo4j-prod", "loki", "tempo", "prometheus"]
      validation: "Test changes on non-production instances first"
      estimated_time: "1-2 hours"

    - step: "Create workflow-system-network on all hosts"
      commands:
        - "docker network create workflow-system-network on each Pi host"
      estimated_time: "15 minutes"

  phase_1_kag_gateway:
    priority: HIGH
    description: "Deploy KAG gateway services to mini2"
    services: ["kag", "kag-orchestrator", "kag-graph"]
    host: mini2
    estimated_time: "2-3 hours"
    prerequisites:
      - "Apply mini2 database config reductions"
      - "Verify mini2 memory not swapping"
    validation:
      - "KAG API responding"
      - "Graph operations working"
      - "Connection to neo4j-prod verified"
    rollback: "Stop KAG services, revert database configs if needed"

  phase_2_ml_heavy:
    priority: HIGH
    description: "Deploy heavy ML services to pi1"
    services: ["karma", "hirag", "pytorch-backend", "pytorch-ingestion-backend", "nlp", "graph-adapter"]
    host: pi1
    estimated_time: "3-4 hours"
    validation:
      - "ML inference endpoints responding"
      - "CPU load average stable (high but not climbing)"
      - "Services returning results (even if slow)"
    rollback: "Stop ML services"

  phase_3_ingestion:
    priority: HIGH
    description: "Deploy ingestion ecosystem to pi2"
    services: ["ingestion", "celery-worker", "celery-beat", "ingestion-redis"]
    host: pi2
    estimated_time: "2-3 hours"
    validation:
      - "Ingestion API responding"
      - "Celery workers processing tasks"
      - "Redis queue functioning"
      - "Connection to KAG services verified"
    rollback: "Stop ingestion services"

  phase_4_coding_main:
    priority: MEDIUM
    description: "Deploy main coding services to pi3"
    services: ["artifacts", "code-graph-helper", "coding-worker", "coding-redis", "quality-analyzer", "coding-nginx"]
    host: pi3
    estimated_time: "3-4 hours"
    validation:
      - "Code graph API responding"
      - "Worker processing jobs"
      - "Quality analyzer functioning"
      - "Artifacts storage working"
    rollback: "Stop coding services"

  phase_5_coding_executors:
    priority: MEDIUM
    description: "Deploy test executors to pi4"
    services: ["python-test-executor", "javascript-test-executor", "java-test-executor", "rust-test-executor", "csharp-test-executor", "go-test-executor", "cpp-test-executor"]
    host: pi4
    estimated_time: "2-3 hours"
    prerequisites:
      - "Apply pi4 observability retention reductions"
      - "Verify disk space available"
    validation:
      - "Each executor environment responding"
      - "Test execution working for each language"
      - "Results returned to main service"
    rollback: "Stop test executors"

  phase_6_observability:
    priority: LOW
    description: "Complete observability stack deployment on pi4"
    services: ["grafana", "loki", "tempo", "prometheus", "grafana-agent", "postgres-exporter"]
    host: pi4
    estimated_time: "4-6 hours"
    validation:
      - "All datasources connected in Grafana"
      - "Metrics scraping from all services"
      - "Logs flowing from all services"
      - "Traces being collected"
      - "Disk usage under 95%"
    rollback: "Can run minimal observability if disk issues"

  phase_7_business_services:
    priority: LOW
    description: "Migrate remaining business services to designated hosts"
    services_by_host:
      m1: ["vault", "fr-frontend", "fr-backend", "fr-redis", "orchestrator", "orchestrator-redis", "n8n", "portoser-frontend", "portoser-backend", "portoser-redis"]
      pi2: ["workers", "kanban", "kanban-mcp", "kanban-nginx", "swagger-ui", "mcp", "enterprise-mcp-redis", "tools"]
      pi3: ["secrets", "licenses", "requirements", "procedures", "procedure-management-redis"]
    estimated_time: "6-8 hours"
    approach: "Can be done in parallel sub-phases by host"

  total_estimated_time: "25-35 hours"
  recommended_approach: "Execute over 2-3 weeks with monitoring between phases"

# ==============================================================================
# Monitoring Requirements
# ==============================================================================

monitoring_requirements:
  critical_metrics:
    memory:
      - "Free memory on mini1, mini2, pi1"
      - "Swap usage on mini2 (must be zero)"
      - "Alert if any host memory >95%"

    cpu:
      - "Load average (1/5/15 min) on all Pi hosts"
      - "Per-service CPU usage top 10"
      - "Alert if load average >8 sustained for 30min on Pi hosts"

    disk:
      - "Disk usage on mini2, pi4"
      - "Alert if disk >90%"
      - "Alert if disk growth >1GB/day unexpected"

    services:
      - "Health check all service endpoints every 5min"
      - "Response time p50, p95, p99"
      - "Error rates per service"

  dashboard_recommendations:
    - "Host resources overview (CPU, memory, disk per host)"
    - "Service health matrix (all 50 services status)"
    - "Database performance (query latency, connections, cache hit rates)"
    - "ML service performance (inference latency, queue depth)"
    - "Coding service performance (test execution times, queue depth)"

  alerting_rules:
    critical:
      - "Any host swap usage >0"
      - "Any host disk >95%"
      - "Database connection pool exhausted"
      - "More than 3 services down"

    warning:
      - "Host memory >90%"
      - "Host disk >85%"
      - "Load average >6 on Pi hosts"
      - "Service response time p95 >5s"

# ==============================================================================
# Performance Expectations
# ==============================================================================

performance_expectations:
  realistic_expectations:
    ml_services:
      - "Inference response times: 2-10 seconds under light load"
      - "Under heavy load: 30-60 seconds (queueing)"
      - "Concurrent requests: 1-2 at a time, others queue"

    coding_service:
      - "Test execution: normal times under light load"
      - "Under heavy load: sequential execution, significant queueing"
      - "Expected: only 1-2 test suites running concurrently"

    databases:
      - "Query performance: normal for simple queries"
      - "Complex queries: may be slower due to reduced cache"
      - "Connection pooling critical to prevent exhaustion"

    ingestion:
      - "Document processing: sequential under load"
      - "Celery tasks: queue naturally, process as resources allow"
      - "Expected throughput: 1-2 documents/minute under load"

    business_services:
      - "Web UIs: normal response times"
      - "APIs: <500ms for simple operations"
      - "Complex operations: may see 1-3 second response times"

  user_acceptance_criteria:
    - "All services functional (per user: 'as long as it will run')"
    - "No memory swapping (prevents system-wide degradation)"
    - "Services respond (even if slowly under load)"
    - "Task queueing acceptable (explicit requirement)"
    - "Degraded performance under heavy load acceptable"

# ==============================================================================
# Optimization Opportunities
# ==============================================================================

optimization_opportunities:
  immediate:
    - "Consolidate Redis instances (8 separate instances, could be 2-3)"
    - "Review actual resource usage after deployment, adjust allocations"
    - "Implement connection pooling for all database clients"

  short_term:
    - "Implement request rate limiting on ML services"
    - "Add caching layers for frequently accessed data"
    - "Optimize database queries based on actual slow query logs"
    - "Review and optimize container resource limits"

  medium_term:
    - "Consider Redis Cluster instead of multiple instances"
    - "Implement autoscaling for celery workers (though limited by CPU)"
    - "Move less critical services to lower priority scheduling"
    - "Implement circuit breakers for cascading failure prevention"

  long_term:
    - "Migrate to Kubernetes for better resource sharing"
    - "Implement horizontal pod autoscaling"
    - "Use external managed services for databases (if acceptable)"
    - "Consider GPU-enabled instances for ML workloads"

# ==============================================================================
# Success Criteria
# ==============================================================================

success_criteria:
  deployment_success:
    - "All 50 services deployed and running"
    - "All service health checks passing"
    - "No memory swapping on any host"
    - "All hosts disk usage <95%"
    - "All inter-service connectivity working"

  operational_success:
    - "Services responding to requests (even if slowly)"
    - "Task queues processing (even if with backlog)"
    - "No service crashes or OOM kills"
    - "Databases accepting connections"
    - "Monitoring and logging operational"

  performance_success:
    - "Light load: normal response times"
    - "Heavy load: degraded but functional performance"
    - "Task queueing working as expected"
    - "No cascading failures"
    - "System remains stable over 7 days continuous operation"

# ==============================================================================
# Rollback Plan
# ==============================================================================

rollback_plan:
  per_phase:
    - "Each phase can be rolled back independently"
    - "Stop services on target host"
    - "Verify old services still running if applicable"
    - "Restore database configs if changed"

  emergency_rollback:
    scenario: "Critical failure affecting multiple services"
    steps:
      - "Identify failing host(s)"
      - "Stop all services on failing host(s)"
      - "Check database integrity"
      - "Restart critical infrastructure only"
      - "Investigate root cause before redeployment"

  data_recovery:
    - "All databases backed up before migration"
    - "Restore from backup if corruption detected"
    - "Redis data is cache/queue - can be rebuilt"
    - "Object storage (MinIO) remains on mini1 - no migration"

# ==============================================================================
# Summary
# ==============================================================================

summary:
  achievement: "COMPLETE allocation of all 50 services across 7 hosts"

  key_numbers:
    total_services: 50
    total_containers: 70+
    services_allocated: 50
    services_unallocated: 0

  resource_strategy:
    cpu: "Accept severe oversubscription (189% cluster average) - workloads are bursty"
    memory: "Stay under physical limits (87% cluster average, 90.09GB of 104GB)"
    disk: "Moderate utilization (57% cluster average) with tight spots addressed"

  critical_success_factors:
    - "Memory under physical limits - prevents swapping"
    - "Workloads are event-driven/bursty, not continuous CPU"
    - "Database configs reduced on mini2 to fit in 16GB"
    - "Observability retention reduced on pi4 to fit in 256GB"
    - "User acceptance of degraded performance under load"

  high_risk_items:
    - "mini2: Memory at 107% - MUST apply config reductions"
    - "pi1: CPU at 350% - extreme but acceptable for ML inference"
    - "pi2: CPU at 290% - extreme but acceptable for task queuing"
    - "pi4: Disk at 102% - MUST apply retention reductions"

  deployment_readiness:
    ready: true
    prerequisites_required: true
    prerequisites:
      - "Apply all configuration changes"
      - "Backup all databases"
      - "Test reduced configs on mini2"
      - "Test reduced retention on pi4"

  next_immediate_actions:
    1: "Review and approve this complete distribution"
    2: "Test mini2 database config reductions in dev environment"
    3: "Test pi4 observability retention reductions"
    4: "Backup all production databases"
    5: "Execute Phase 1: Deploy KAG gateway to mini2"
    6: "Monitor mini2 for memory/swap issues for 48 hours"
    7: "Execute remaining phases sequentially with validation"

  final_assessment: |
    This distribution successfully allocates ALL 50 services across the 7 available
    hosts. It requires accepting:

    1. Severe CPU oversubscription (189% average, up to 350% on pi1)
    2. Tight memory on several hosts (87% average, 98-107% on mini1/mini2/pi1)
    3. Database configuration reductions on mini2
    4. Observability retention reductions on pi4
    5. Degraded performance under heavy concurrent load

    Per user requirements ("as long as it will run it is fine"), this is ACCEPTABLE.

    The key constraint met: Memory stays under physical limits (except mini2, which
    requires config changes to fix). This prevents swapping, which would cause
    system-wide performance collapse.

    Services will run, but will queue and process sequentially under load. This is
    expected and acceptable for the workload characteristics (ML inference, test
    execution, document processing are all naturally bursty/sequential).

    CRITICAL: Must apply configuration changes to mini2 and pi4 BEFORE deployment,
    or those hosts will fail (mini2 from swapping, pi4 from disk full).
